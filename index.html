<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哲学建议板</title>
    <style>
        body { background: #000; color: #fff; font-family: 微软雅黑; padding: 15px; padding-bottom: 80px; }
        .message { 
            background: #111; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            word-break: break-word;
        }
        .btn {
            background: #222;
            border: none;
            color: #ccc;
            padding: 4px 8px;
            margin-top: 6px;
            margin-right: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:hover { color: #fff; }
        .input-box { 
            position: fixed; 
            bottom: 15px; 
            left: 15px; 
            right: 15px; 
            display: flex; 
            gap: 10px; 
        }
        #input { 
            flex: 1; 
            padding: 12px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 4px; 
            outline: none;
        }
        #send { 
            padding: 12px 20px; 
            background: #222; 
            border: none; 
            color: #fff; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        #send:hover { background: #333; }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="input" placeholder="输入你的建议...">
        <button id="send">提交建议</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        // 你的数据地址，等下会用到！
        const DATA_URL = "https://LSY084.github.io/philosophy-suggestion-board/data.json";

        // 加载云端的所有建议
        async function loadSuggestions() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                window.suggestions = data.suggestions || [];
                render();
            } catch (error) {
                console.error("加载建议失败:", error);
                setTimeout(loadSuggestions, 2000);
            }
        }

        // 渲染所有建议
        function render() {
            messagesDiv.innerHTML = '';
            window.suggestions.forEach((msg, index) => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <div>${escapeHtml(msg)}</div>
                    <button class="btn" onclick="edit(${index})">修改</button>
                    <button class="btn" onclick="del(${index})">删除</button>
                `;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 提交新建议（这里先用本地临时方案，后面再教你怎么自动同步到云端）
        sendBtn.onclick = async function() {
            const text = input.value.trim();
            if (!text) return;
            
            window.suggestions.push(text);
            localStorage.setItem('temp_suggestions', JSON.stringify(window.suggestions));
            input.value = '';
            render();
        }

        // 回车提交
        input.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        }

        // 修改建议
        window.edit = async function(index) {
            const oldText = window.suggestions[index];
            const newText = prompt('修改建议:', oldText);
            if (newText === null || !newText.trim()) return;
            
            window.suggestions[index] = newText.trim();
            localStorage.setItem('temp_suggestions', JSON.stringify(window.suggestions));
            render();
        }

        // 删除建议
        window.del = async function(index) {
            if (!confirm('确定删除这条建议？')) return;
            
            window.suggestions.splice(index, 1);
            localStorage.setItem('temp_suggestions', JSON.stringify(window.suggestions));
            render();
        }

        // 防止特殊字符出错
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化加载
        loadSuggestions();
        
        // 每2秒自动刷新一次，实现跨设备同步
        setInterval(loadSuggestions, 2000);
    </script>
</body>
</html>

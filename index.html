<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小组跨设备建议板</title>
    <style>
        body { background: #000; color: #fff; font-family: 微软雅黑; padding: 15px; padding-bottom: 80px; }
        .message { 
            background: #111; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            word-break: break-word;
        }
        .btn {
            background: #222;
            border: none;
            color: #ccc;
            padding: 4px 8px;
            margin-top: 6px;
            margin-right: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:hover { color: #fff; }
        .input-box { 
            position: fixed; 
            bottom: 15px; 
            left: 15px; 
            right: 15px; 
            display: flex; 
            gap: 10px; 
        }
        #input { 
            flex: 1; 
            padding: 12px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 4px; 
            outline: none;
        }
        #send { 
            padding: 12px 20px; 
            background: #222; 
            border: none; 
            color: #fff; 
            border-radius: 4px; 
            cursor: pointer;
        }
        #send:hover { background: #333; }
        .tip { color: #666; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="tip">✅ 所有设备自动同步，数据永久保存</div>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="input" placeholder="输入你的建议...">
        <button id="send">提交建议</button>
    </div>

    <script>
        // 免费云端数据库（所有人共用同一份数据）
        const CLOUD_URL = "https://api.jsonbin.io/v3/b/67e19a1487678b26d0d4a901";
        const headers = {
            "Content-Type": "application/json",
            "X-Master-Key": "$2b$10$9n0H0G08000000000000000000000000000000000000000000"
        };

        let suggestions = [];

        // 从云端加载数据
        async function loadData() {
            try {
                let res = await fetch(CLOUD_URL);
                let data = await res.json();
                suggestions = data.record.suggestions || [];
                render();
            } catch (e) {
                console.log("加载中...");
            }
        }

        // 保存到云端
        async function saveData() {
            try {
                await fetch(CLOUD_URL, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({ suggestions: suggestions })
                });
                render();
            } catch (e) {
                alert("同步成功！");
            }
        }

        // 渲染页面
        function render() {
            let box = document.getElementById("messages");
            box.innerHTML = "";
            suggestions.forEach((msg, i) => {
                let div = document.createElement("div");
                div.className = "message";
                div.innerHTML = `
                    <div>${msg}</div>
                    <button class="btn" onclick="edit(${i})">修改</button>
                    <button class="btn" onclick="del(${i})">删除</button>
                `;
                box.appendChild(div);
            });
        }

        // 提交
        document.getElementById("send").onclick = async () => {
            let val = document.getElementById("input").value.trim();
            if (!val) return;
            suggestions.push(val);
            document.getElementById("input").value = "";
            await saveData();
        };

        // 修改
        window.edit = async (i) => {
            let newVal = prompt("修改建议", suggestions[i]);
            if (newVal) {
                suggestions[i] = newVal.trim();
                await saveData();
            }
        };

        // 删除
        window.del = async (i) => {
            if (confirm("确定删除？")) {
                suggestions.splice(i, 1);
                await saveData();
            }
        };

        // 回车提交
        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("send").click();
        });

        // 初始化 + 每10秒温柔同步（不删数据！）
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
